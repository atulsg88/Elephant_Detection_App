<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trunk-Tech Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        .status-pulse-green { animation: pulse-green 2s infinite; box-shadow: 0 0 0 0 rgba(16, 185, 129, 1); }
        .status-pulse-red { animation: pulse-red 2s infinite; box-shadow: 0 0 0 0 rgba(239, 68, 68, 1); }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        #heatmap-map { height: 600px; width: 100%; z-index: 1; }
        
        .tab-btn { transition: all 0.2s ease-in-out; border-bottom: 2px solid transparent; }
        .tab-btn.active { border-color: #4f46e5; color: #4f46e5; background-color: #eef2ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>

<body class="bg-gray-100 text-gray-800">

    <div id="dashboard-content" class="container mx-auto p-4 sm:p-6 lg:p-8">
        <header class="bg-white shadow-md rounded-lg p-6 mb-6">
            <h1 class="text-3xl font-bold text-gray-900">Trunk-Tech Systems Dashboard</h1>
            <p class="text-gray-600 mt-1">Real-time monitoring and detection analytics.</p>
        </header>

        <div class="mb-6 border-b border-gray-200">
            <nav class="flex space-x-4">
                <button onclick="changeTab('systems')" class="tab-btn active px-4 py-2 font-medium text-sm rounded-t-lg">Systems</button>
                <button onclick="changeTab('history')" class="tab-btn px-4 py-2 font-medium text-sm rounded-t-lg">History</button>
                <button onclick="changeTab('heatmap')" class="tab-btn px-4 py-2 font-medium text-sm rounded-t-lg">Heatmap</button>
            </nav>
        </div>

        <main>
            <div id="systems-tab" class="tab-content active">
                <div id="systems-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                <div id="systems-loading" class="text-center py-10 text-gray-500">Connecting to database...</div>
            </div>

            <div id="history-tab" class="tab-content bg-white p-6 rounded-lg shadow-md overflow-x-auto">
                <h2 class="text-xl font-bold mb-4">Detection History</h2>
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Timestamp</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">System ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Location (Lat, Lon)</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Capture</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body" class="bg-white divide-y divide-gray-200"></tbody>
                </table>
            </div>

            <div id="heatmap-tab" class="tab-content bg-white p-6 rounded-lg shadow-md">
                <div class="flex items-center space-x-4 mb-4">
                    <label class="font-semibold">Filter:</label>
                    <button id="filter-day" onclick="filterHeatmap('day')" class="px-4 py-2 rounded-md bg-gray-200">Today</button>
                    <button id="filter-month" onclick="filterHeatmap('month')" class="px-4 py-2 rounded-md bg-indigo-600 text-white">This Month</button>
                    <button id="filter-year" onclick="filterHeatmap('year')" class="px-4 py-2 rounded-md bg-gray-200">This Year</button>
                </div>
                <div id="heatmap-map" class="rounded-lg border border-gray-200"></div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCT8WUI-gdltwiKCno8QATP6bvrwPLHAag",
            authDomain: "trunk-tech.firebaseapp.com",
            databaseURL: "https://trunk-tech-default-rtdb.firebaseio.com",
            projectId: "trunk-tech",
            storageBucket: "trunk-tech.appspot.com",
            messagingSenderId: "822659689918",
            appId: "1:822659689918:web:32a1dd7b64f11cbb669def",
            measurementId: "G-VEV5PTXDBC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global State
        let map;
        let heatmapLayer = null;
        let allDetectionPoints = [];

        // Global function for downloading Base64 images
        window.downloadImage = function(base64Data, fileName) {
            if (!base64Data) return;
            const link = document.createElement("a");
            link.href = base64Data;
            link.download = fileName;
            link.click();
        };

        // --- Tab Management ---
        window.changeTab = function (tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`${tabName}-tab`).classList.add('active');
            document.querySelector(`button[onclick="changeTab('${tabName}')"]`).classList.add('active');
            
            if (tabName === 'heatmap' && map) {
                setTimeout(() => {
                    map.invalidateSize();
                    if (heatmapLayer) filterHeatmap('month'); 
                }, 250);
            }
        }

        // --- Systems Logic ---
        function initializeSystems() {
            onValue(ref(db, 'detection_systems'), snapshot => {
                const listDiv = document.getElementById('systems-list');
                const loadingDiv = document.getElementById('systems-loading');
                if (loadingDiv) loadingDiv.style.display = 'none';
                listDiv.innerHTML = '';
                
                if (!snapshot.exists()) {
                    listDiv.innerHTML = '<p class="col-span-full text-center py-10">No systems connected.</p>';
                    return;
                }
                snapshot.forEach(child => {
                    listDiv.insertAdjacentHTML('beforeend', createSystemCard(child.key, child.val()));
                });
            });
        }

        window.createSystemCard = function (id, data) {
            const status = data.detection_status || 'Unknown';
            const isAlert = status === 'Elephant Detected';
            const statusColor = isAlert ? 'bg-red-500 status-pulse-red' : 
                                status === 'All Clear' ? 'bg-green-500 status-pulse-green' : 'bg-gray-500';
            
            const liveImg = data.live_footage || "";
            const detectionImg = data.last_image_data || "";

            return `
                <div class="bg-white p-6 rounded-lg shadow-md border-t-4 ${isAlert ? 'border-red-500' : 'border-indigo-500'}">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-bold text-gray-800 truncate pr-2" title="${id}">${id}</h3>
                        <div class="flex items-center">
                            <div class="w-3 h-3 rounded-full ${statusColor} mr-2"></div>
                            <span class="text-xs font-bold">${status}</span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <p class="text-[10px] font-bold text-red-600 mb-1 flex items-center">
                            <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse mr-1"></span> LIVE MONITORING
                        </p>
                        <div class="w-full h-44 bg-black rounded overflow-hidden flex items-center justify-center border-2 border-gray-800">
                            ${liveImg ? `<img src="${liveImg}" class="w-full h-full object-contain">` : `<p class="text-gray-500 text-xs">Offline</p>`}
                        </div>
                    </div>

                    <div class="mb-4">
                        <p class="text-[10px] font-bold text-gray-500 mb-1 uppercase">Last Detection</p>
                        <div class="w-full h-32 bg-gray-100 rounded overflow-hidden flex items-center justify-center border">
                            ${detectionImg ? `<img src="${detectionImg}" class="w-full h-full object-cover">` : `<span class="text-gray-400 text-[10px]">No Detection</span>`}
                        </div>
                    </div>

                    <p class="text-[10px] text-gray-400 mb-4">Updated: ${data.last_updated || 'N/A'}</p>

                    <div class="flex space-x-2 mb-3">
                        <input type="number" step="any" id="lat-${id}" value="${data.location?.latitude || ''}" placeholder="Lat" class="w-1/2 p-2 border text-[10px] rounded">
                        <input type="number" step="any" id="lon-${id}" value="${data.location?.longitude || ''}" placeholder="Lon" class="w-1/2 p-2 border text-[10px] rounded">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="updateLocation('${id}')" class="bg-indigo-600 text-white text-[10px] py-2 rounded hover:bg-indigo-700">Set GPS</button>
                        <button onclick="downloadImage('${detectionImg || liveImg}', '${id}_capture.jpg')" 
                                class="bg-gray-800 text-white text-[10px] py-2 rounded hover:bg-black transition">
                            Save Image
                        </button>
                    </div>
                </div>`;
        }

        window.updateLocation = function (id) {
            const lat = parseFloat(document.getElementById(`lat-${id}`).value);
            const lon = parseFloat(document.getElementById(`lon-${id}`).value);
            
            if (isNaN(lat) || isNaN(lon)) return alert("Please enter valid coordinates.");
            
            set(ref(db, `detection_systems/${id}/location`), { latitude: lat, longitude: lon })
                .then(() => alert("Location updated successfully."))
                .catch(e => alert("Error: " + e.message));
        }

        // --- History Logic ---
        function initializeHistory() {
            onValue(ref(db, 'detection_history'), snapshot => {
                const tableBody = document.getElementById('history-table-body');
                tableBody.innerHTML = '';
                if (!snapshot.exists()) return;
                
                let events = [];
                snapshot.forEach(c => events.push(c.val()));
                events.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
                      .forEach(e => {
                          const lat = e.latitude ? e.latitude.toFixed(4) : 'N/A';
                          const lon = e.longitude ? e.longitude.toFixed(4) : 'N/A';
                          const imgLink = e.last_image_data || e.image_data || "";
                          
                          tableBody.innerHTML += `
                            <tr>
                                <td class="px-6 py-4 text-sm">${e.timestamp}</td>
                                <td class="px-6 py-4 text-sm">${e.system_id}</td>
                                <td class="px-6 py-4 text-sm">${lat}, ${lon}</td>
                                <td class="px-6 py-4 text-sm">
                                    ${imgLink ? `<button onclick="downloadImage('${imgLink}', 'history_${e.timestamp}.jpg')" class="text-indigo-600 hover:underline">Download</button>` : 'None'}
                                </td>
                            </tr>`;
                      });
            });
        }

        // --- Heatmap Logic ---
        function initializeHeatmap() {
            map = L.map('heatmap-map').setView([18.62, 73.81], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            heatmapLayer = L.heatLayer([], { radius: 25, maxZoom: 14, blur: 15 }).addTo(map);

            onValue(ref(db, 'detection_history'), snapshot => {
                allDetectionPoints = [];
                if (snapshot.exists()) {
                    snapshot.forEach(c => {
                        const v = c.val();
                        if (v.latitude && v.longitude) {
                            allDetectionPoints.push({ 
                                lat: v.latitude, 
                                lng: v.longitude, 
                                timestamp: new Date(v.timestamp.replace(" ", "T") + "Z") 
                            });
                        }
                    });
                }
                filterHeatmap('month');
            });
        }

        window.filterHeatmap = function (period) {
            if (!heatmapLayer) return;

            const now = new Date();
            let start;
            if (period === 'day') start = new Date(now.setHours(0,0,0,0));
            else if (period === 'month') start = new Date(now.getFullYear(), now.getMonth(), 1);
            else start = new Date(now.getFullYear(), 0, 1);

            const filtered = allDetectionPoints.filter(p => p.timestamp >= start);
            heatmapLayer.setLatLngs(filtered.map(p => [p.lat, p.lng]));

            document.querySelectorAll('#heatmap-tab button').forEach(b => {
                if (b.id.startsWith('filter-')) {
                    b.className = b.id === `filter-${period}` ? 'px-4 py-2 rounded-md bg-indigo-600 text-white' : 'px-4 py-2 rounded-md bg-gray-200';
                }
            });
        }

        // --- Execute Immediately ---
        initializeSystems();
        initializeHistory();
        
        setTimeout(() => {
            initializeHeatmap();
        }, 500);

    </script>
</body>
</html>
